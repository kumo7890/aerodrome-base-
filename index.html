<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aerodrome Base Analytics</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

    :root {
      --bg: #080c10;
      --surface: #0a1520;
      --surface2: #0d1f30;
      --border: #1a3a5c;
      --border2: #1e4d6b;
      --cyan: #00d4ff;
      --green: #00ff88;
      --amber: #ffaa00;
      --red: #ff5050;
      --muted: #4a7fa5;
      --text: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #0a0f1a, #0d1b2a, #091520);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #0066ff);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: bold; color: #fff;
      box-shadow: 0 0 16px rgba(0,212,255,0.4);
    }
    .logo-title { font-size: 16px; font-weight: 700; letter-spacing: 2px; color: var(--cyan); }
    .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 3px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .block-badge { font-size: 11px; color: var(--muted); }
    .block-badge span { color: var(--green); margin-right: 6px; }
    .refresh-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--cyan); padding: 6px 14px; cursor: pointer;
      font-size: 11px; letter-spacing: 1px; border-radius: 4px;
      font-family: inherit; transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--cyan); background: rgba(0,212,255,0.05); }
    .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    nav { border-bottom: 1px solid #0d1f30; padding: 0 24px; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; }
    .tab-btn {
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted); padding: 16px 20px; cursor: pointer;
      font-size: 11px; letter-spacing: 2px; font-family: inherit;
      text-transform: uppercase; transition: all 0.2s;
    }
    .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

    main { max-width: 1200px; margin: 0 auto; padding: 24px; }

    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: linear-gradient(135deg, var(--surface), var(--surface2));
      border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px;
    }
    .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 8px; }
    .stat-value { font-size: 24px; font-weight: 700; }

    .pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap: 16px; }
    .pool-card {
      background: linear-gradient(135deg, var(--surface), var(--surface2));
      border: 1px solid var(--border2); border-radius: 8px; padding: 20px;
      transition: border-color 0.3s;
    }
    .pool-card:hover { border-color: var(--cyan); }
    .pool-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .pool-name { font-size: 14px; font-weight: 700; letter-spacing: 1px; }
    .whale-alert { background: rgba(255,80,80,0.15); border: 1px solid var(--red); color: var(--red); padding: 6px 12px; border-radius: 4px; font-size: 11px; margin-top: 8px; text-align: center; }

    .empty-state { color: var(--muted); text-align: center; padding: 48px 0; font-size: 14px; }

    .alert-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .btn-remove { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); color: var(--red); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }

    .triggered-banner { background: rgba(255,80,80,0.2); border-left: 4px solid var(--red); padding: 12px; margin: 8px 0; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">A</div>
      <div>
        <div class="logo-title">AERODROME BASE</div>
        <div class="logo-sub">ON-CHAIN ANALYTICS</div>
      </div>
    </div>
    <div class="header-right">
      <div class="block-badge" id="blockBadge" style="display:none;">
        <span>●</span> BLOCK <span id="blockNum"></span>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">↻ REFRESH</button>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <button class="tab-btn active" onclick="switchTab('dashboard', this)">DASHBOARD</button>
    <button class="tab-btn" onclick="switchTab('alerts', this)">ALERTS</button>
  </div>
</nav>

<main>
  <div id="tab-dashboard">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">POOLS LIVE</div>
        <div class="stat-value" id="poolsLive">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">TOTAL TVL (USD)</div>
        <div class="stat-value" id="totalTVL">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">LAST UPDATED</div>
        <div class="stat-value" id="lastUpdated">—</div>
      </div>
    </div>

    <div class="pool-grid" id="poolGrid"></div>
  </div>

  <div id="tab-alerts" style="display:none;">
    <h2 style="font-size:16px;margin-bottom:16px;">Configure Alerts</h2>
    <div style="display:grid;gap:12px;max-width:500px;">
      <select id="alertPool">
        <!-- populated dynamically -->
      </select>
      <select id="alertCondition">
        <option value="0">TVL drops below</option>
        <option value="1">TVL rises above</option>
        <option value="2">Reserve change > % (whale-like)</option>
      </select>
      <input type="number" id="alertValue" placeholder="Threshold (e.g. 1000000 or 10 for %)" step="any">
      <input type="text" id="alertTelegram" placeholder="@telegram (for future notify)">
      <button onclick="addAlert()" style="background:var(--cyan);color:#000;padding:12px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;">+ ADD ALERT</button>
    </div>

    <div id="alertList" style="margin-top:32px;"></div>
    <div id="triggeredSection" style="margin-top:32px;display:none;">
      <h3 style="color:var(--red);">TRIGGERED ALERTS</h3>
      <div id="triggeredList"></div>
    </div>
  </div>
</main>

<script>
const RPC_URLS = [
  "https://mainnet.base.org",
  "https://rpc.ankr.com/base",
  "https://base.llamarpc.com",
  "https://base-mainnet.public.blastapi.io"
];

const POOLS = [
  { address: "0xcDAC0d6c6C59727a65F871236188350531885C43", name: "WETH/USDC",   token0: "WETH", token1: "USDC",   d0:18, d1:6  },
  { address: "0x7c2eA10D3e5922ba3bBBafa39Dc0f59b3C1F2cC", name: "WETH/cbETH",  token0: "WETH", token1: "cbETH",  d0:18, d1:18 },
  { address: "0xB4885Bc63399BF5518b994c1545d85688b7f710a", name: "USDC/USDbC", token0: "USDC", token1: "USDbC", d0:6,  d1:6  },
  { address: "0x6cDcb1C4A4D1C3C6d054b27AC5B77e89eAFb971b", name: "AERO/WETH",  token0: "AERO", token1: "WETH",   d0:18, d1:18 },
  { address: "0x2578365B3dfFa79b79cA3E09f5A6c05A19bfE46", name: "USDC/DAI",    token0: "USDC", token1: "DAI",    d0:6,  d1:18 },
];

const poolData = POOLS.map(p => ({...p, r0:null, r1:null, tvlUSD:0, history:[], lastR0:0, lastR1:0, error:false}));

let alerts = [];
let triggered = [];
let cooldowns = {};
let prices = { ethereum: { usd: 0 }, "usd-coin": { usd: 1 }, "aerodrome-finance": { usd: 0 }, "coinbase-wrapped-staked-eth": { usd: 0 }, dai: { usd: 1 } };

async function rpc(method, params) {
  for (const url of RPC_URLS) {
    try {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ jsonrpc: "2.0", id: 1, method, params })
      });
      const d = await r.json();
      if (d.result) return d.result;
    } catch {}
  }
  return null;
}

async function getPrices() {
  try {
    const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ethereum,usd-coin,aerodrome-finance,coinbase-wrapped-staked-eth,dai&vs_currencies=usd");
    prices = await res.json();
  } catch {}
}

async function getReserves(pool) {
  const data = await rpc("eth_call", [{ to: pool.address, data: "0x0902f1ac" }, "latest"]);
  if (!data || data === "0x") return null;
  const r0 = BigInt("0x" + data.slice(2, 66));
  const r1 = BigInt("0x" + data.slice(66, 130));
  return { r0, r1 };
}

function formatNum(n) {
  if (!n) return "—";
  if (n >= 1e9) return "$" + (n/1e9).toFixed(2) + "B";
  if (n >= 1e6) return "$" + (n/1e6).toFixed(2) + "M";
  return "$" + n.toLocaleString(undefined, {maximumFractionDigits:0});
}

function renderPools() {
  const live = poolData.filter(p => !p.error && p.r0 !== null).length;
  document.getElementById("poolsLive").textContent = `${live} / ${poolData.length}`;
  
  const totalTVL = poolData.reduce((sum, p) => sum + p.tvlUSD, 0);
  document.getElementById("totalTVL").textContent = formatNum(totalTVL);

  document.getElementById("lastUpdated").textContent = new Date().toLocaleTimeString();

  const grid = document.getElementById("poolGrid");
  grid.innerHTML = poolData.map((pool, i) => {
    const r0n = pool.r0 ? Number(pool.r0) / 10**pool.d0 : 0;
    const r1n = pool.r1 ? Number(pool.r1) / 10**pool.d1 : 0;
    const p0 = pool.token0 === "WETH" ? prices.ethereum?.usd : (pool.token0 === "AERO" ? prices["aerodrome-finance"]?.usd : 1);
    const p1 = pool.token1 === "WETH" ? prices.ethereum?.usd : (pool.token1 === "AERO" ? prices["aerodrome-finance"]?.usd : 1);
    const tvl = r0n * p0 + r1n * p1;
    pool.tvlUSD = tvl;

    const whaleDetected = (pool.lastR0 && Math.abs(r0n - pool.lastR0)/pool.lastR0 > 0.10) ||
                          (pool.lastR1 && Math.abs(r1n - pool.lastR1)/pool.lastR1 > 0.10);
    if (whaleDetected) {
      const msg = `WHALE ALERT: ${pool.name} reserve change >10%`;
      triggered.push({msg, time: new Date()});
      renderTriggered();
    }
    pool.lastR0 = r0n;
    pool.lastR1 = r1n;

    return `
      <div class="pool-card">
        <div class="pool-header">
          <div class="pool-name">${pool.name}</div>
          <div style="color:\( {pool.error ? 'var(--red)' : 'var(--green)'};"> \){pool.error ? 'ERROR' : 'LIVE'}</div>
        </div>
        <div>Reserve0: ${r0n.toLocaleString(undefined,{maximumFractionDigits:0})} ${pool.token0}</div>
        <div>Reserve1: ${r1n.toLocaleString(undefined,{maximumFractionDigits:0})} ${pool.token1}</div>
        <div>TVL: ${formatNum(tvl)}</div>
        ${whaleDetected ? '<div class="whale-alert">WHALE MOVEMENT DETECTED</div>' : ''}
        <div style="margin-top:12px;">${Sparkline(pool.history)}</div>
      </div>`;
  }).join("");
}

function Sparkline({history}) {
  if (history.length < 2) return "";
  const min = Math.min(...history), max = Math.max(...history), range = max-min||1;
  const w=180, h=40;
  const pts = history.map((v,i) => `\( {(i/(history.length-1))*w}, \){h - ((v-min)/range)*h}`).join(" ");
  return `<svg width="\( {w}" height=" \){h}" viewBox="0 0 ${w} \( {h}"><polyline points=" \){pts}" fill="none" stroke="var(--cyan)" stroke-width="2"/></svg>`;
}

function renderTriggered() {
  if (!triggered.length) return;
  document.getElementById("triggeredSection").style.display = "block";
  document.getElementById("triggeredList").innerHTML = triggered.slice(-5).map(t => `
    <div class="triggered-banner">\( {t.msg} <small> \){t.time.toLocaleTimeString()}</small></div>
  `).join("");
}

function renderAlertList() {
  const el = document.getElementBy
